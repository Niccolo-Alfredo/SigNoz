---
# =============================================================================
# SigNoz Stack - Group Variables
# Single source of truth per tutte le variabili dello stack.
# I ruoli referenziano queste variabili nei propri defaults/main.yml.
# =============================================================================

# -----------------------------------------------------------------------------
# Zookeeper
# -----------------------------------------------------------------------------
zookeeper_version: "3.8.6"
zookeeper_install_dir: /opt/zookeeper
zookeeper_data_dir: /var/lib/zookeeper
zookeeper_log_dir: /var/log/zookeeper
zookeeper_user: zookeeper
zookeeper_group: zookeeper
zookeeper_client_port: 2181
zookeeper_admin_port: 3181
zookeeper_tick_time: 2000
zookeeper_java_package: java-17-openjdk-headless

# -----------------------------------------------------------------------------
# ClickHouse
# -----------------------------------------------------------------------------
clickhouse_version: ""          # vuoto = latest; es. "24.8.4.13" per pinnare
clickhouse_password: "password" # TODO: spostare in ansible-vault
clickhouse_cluster_name: cluster
clickhouse_shard: "01"
clickhouse_replica: "01"
clickhouse_zookeeper_host: 127.0.0.1
clickhouse_zookeeper_port: "{{ zookeeper_client_port }}"
clickhouse_remote_host: 127.0.0.1
clickhouse_remote_port: 9000

# -----------------------------------------------------------------------------
# SigNoz
# -----------------------------------------------------------------------------
signoz_version: "latest"              # es. "v0.79.0" per pinnare
signoz_otel_collector_version: "latest"
signoz_install_dir: /opt/signoz
signoz_data_dir: /var/lib/signoz
signoz_user: signoz
signoz_group: signoz
signoz_api_port: 8080
signoz_jwt_secret: "changeme-jwt-secret"  # TODO: spostare in ansible-vault
signoz_alertmanager_provider: signoz
signoz_telemetrystore_provider: clickhouse
signoz_dot_metrics_enabled: true
signoz_instrumentation_logs_level: info
signoz_web_enabled: true
signoz_run_migrations: true

# DSN derivato dalla password ClickHouse (single source of truth)
signoz_clickhouse_dsn: "tcp://localhost:{{ clickhouse_remote_port }}?password={{ clickhouse_password }}"

# -----------------------------------------------------------------------------
# SigNoz OTel Collector
# -----------------------------------------------------------------------------
signoz_otel_install_dir: /opt/signoz-otel-collector
signoz_otel_data_dir: /var/lib/signoz-otel-collector
signoz_otel_user: "{{ signoz_user }}"
signoz_otel_group: "{{ signoz_group }}"
signoz_otel_opamp_server_endpoint: "ws://127.0.0.1:4320/v1/opamp"

# DSN per dominio telemetry (derivati da clickhouse_password)
signoz_otel_clickhouse_traces_dsn:   "tcp://localhost:{{ clickhouse_remote_port }}/signoz_traces?password={{ clickhouse_password }}"
signoz_otel_clickhouse_metrics_dsn:  "tcp://localhost:{{ clickhouse_remote_port }}/signoz_metrics?password={{ clickhouse_password }}"
signoz_otel_clickhouse_logs_dsn:     "tcp://localhost:{{ clickhouse_remote_port }}/signoz_logs?password={{ clickhouse_password }}"
signoz_otel_clickhouse_metadata_dsn: "tcp://localhost:{{ clickhouse_remote_port }}/signoz_metadata?password={{ clickhouse_password }}"