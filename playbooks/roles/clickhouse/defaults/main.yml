---
# -----------------------------------------------------------------------------
# Version
# Pin to a specific LTS version for stability in staging and production.
# Check https://clickhouse.com/docs/en/whats-new/changelog for updates.
# Leave empty ("") to always install the latest available in the channel.
# -----------------------------------------------------------------------------
clickhouse_version: "25.8.22.28"

# -----------------------------------------------------------------------------
# Repository
# channel: "lts" for Long Term Support (~quarterly releases, recommended)
#          "stable" for latest stable (more frequent releases)
# The official .repo file from ClickHouse contains both channels; we enable
# only the selected one and disable the other to avoid version conflicts.
# -----------------------------------------------------------------------------
clickhouse_repo_channel: "lts"

# -----------------------------------------------------------------------------
# Packages
# -----------------------------------------------------------------------------
clickhouse_packages:
  - clickhouse-server
  - clickhouse-client

# -----------------------------------------------------------------------------
# Credentials
# NOTE: internal password, not exposed outside the host.
# TODO: move to ansible-vault before production rollout.
# -----------------------------------------------------------------------------
clickhouse_password: "password"

# -----------------------------------------------------------------------------
# Paths
# config.d and users.d are the override directories — we never touch
# the main config.xml installed by the RPM package.
# -----------------------------------------------------------------------------
clickhouse_config_dir: /etc/clickhouse-server/config.d
clickhouse_users_dir: /etc/clickhouse-server/users.d

# -----------------------------------------------------------------------------
# Cluster topology
# Single-node setup with replicated schema for SigNoz compatibility.
# SigNoz migrations use --clickhouse-replication=true which requires
# macros and remote_servers to be defined even for a single node.
# -----------------------------------------------------------------------------
clickhouse_cluster_name: cluster
clickhouse_shard: "01"
clickhouse_replica: "01"

# -----------------------------------------------------------------------------
# Zookeeper connection
# Must match zookeeper role defaults (zookeeper_client_port).
# -----------------------------------------------------------------------------
clickhouse_zookeeper_host: 127.0.0.1
clickhouse_zookeeper_port: 2181

# -----------------------------------------------------------------------------
# Ports
# -----------------------------------------------------------------------------
clickhouse_remote_host: 127.0.0.1
clickhouse_remote_port: 9000

# -----------------------------------------------------------------------------
# System user
# Created automatically by the RPM package — do not change.
# -----------------------------------------------------------------------------
clickhouse_user: clickhouse
clickhouse_group: clickhouse

# -----------------------------------------------------------------------------
# TTL merges
# Impostare a true solo in caso di recovery dopo SYSTEM STOP TTL MERGES.
# Il motore è attivo di default su installazioni fresche.
# -----------------------------------------------------------------------------
clickhouse_start_ttl_merges: false

# -----------------------------------------------------------------------------
# ClickHouse Retention (giorni) for signoz data (traces, logs, metrics, system logs).
# Baseline: ~2.5gg = 19GB traces, 4.9GB system, 480MB metrics, 330MB logs
# Disco disponibile: 920GB. Headroom riservato: ~100GB oltre keep_free_space.
# Stima consumo totale con questi valori: ~276GB (~30% disco).
# -----------------------------------------------------------------------------
signoz_retention_traces_days: 30       # ~8 GB/giorno → ~240 GB
signoz_retention_logs_days: 30         # ~0.15 GB/giorno → ~4.5 GB
signoz_retention_metrics_days: 90      # ~0.2 GB/giorno → ~18 GB
signoz_retention_system_logs_days: 7   # ~2 GB/giorno → ~14 GB