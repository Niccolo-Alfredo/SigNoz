---
# Version pinning
# Pinned to 25.8 LTS - latest signed and stable LTS release.
# The 26.x packages in the LTS channel are currently unsigned (known upstream issue).
# Set to "" to use latest in channel (not recommended until signing is fixed upstream).
clickhouse_version: "25.8.22.28"

# Repository channel: "lts" for Long Term Support, "stable" for latest stable
clickhouse_repo_channel: "lts"

# Packages
clickhouse_packages:
- clickhouse-server
- clickhouse-client

# Database credentials
# NOTE: staging/prod internal password. To be moved to ansible-vault.
clickhouse_password: "password"

# Paths
clickhouse_config_dir: /etc/clickhouse-server/config.d
clickhouse_users_dir: /etc/clickhouse-server/users.d

# Cluster topology (single-node, replicated schema for SigNoz compatibility)
clickhouse_cluster_name: cluster
clickhouse_shard: "01"
clickhouse_replica: "01"

# Zookeeper connection (defaults to local instance from zookeeper role)
clickhouse_zookeeper_host: 127.0.0.1
clickhouse_zookeeper_port: 2181

# Internal remote server
clickhouse_remote_host: 127.0.0.1
clickhouse_remote_port: 9000

# System user (created by RPM package)
clickhouse_user: clickhouse
clickhouse_group: clickhouse
