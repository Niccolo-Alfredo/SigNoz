---
# -----------------------------------------------------------------------------
# Swap
# -----------------------------------------------------------------------------
- name: Disable swap immediately
  ansible.builtin.command:
    cmd: swapoff -a
  changed_when: false
  tags: [clickhouse, install, clickhouse_install]

- name: Disable swap permanently (remove from /etc/fstab)
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\s+swap\s+.*)$'
    replace: '# \1'
  tags: [clickhouse, install, clickhouse_install]

# -----------------------------------------------------------------------------
# Repository
# -----------------------------------------------------------------------------
- name: Install yum-utils
  ansible.builtin.dnf:
    name: yum-utils
    state: present
  tags: [clickhouse, install, clickhouse_install]

- name: Import official ClickHouse repo file
  ansible.builtin.get_url:
    url: "https://packages.clickhouse.com/rpm/clickhouse.repo"
    dest: /etc/yum.repos.d/clickhouse.repo
    mode: "0644"
    force: false
  tags: [clickhouse, install, clickhouse_install]

- name: Enable only the {{ clickhouse_repo_channel }} channel, disable the other
  ansible.builtin.ini_file:
    path: /etc/yum.repos.d/clickhouse.repo
    section: "{{ item.section }}"
    option: enabled
    value: "{{ item.enabled }}"
    mode: "0644"
  loop:
    - section: clickhouse-stable
      enabled: "{{ '1' if clickhouse_repo_channel == 'stable' else '0' }}"
    - section: clickhouse-lts
      enabled: "{{ '1' if clickhouse_repo_channel == 'lts' else '0' }}"
  tags: [clickhouse, install, clickhouse_install]

# -----------------------------------------------------------------------------
# Install
# -----------------------------------------------------------------------------
- name: Install ClickHouse packages
  ansible.builtin.dnf:
    name: >-
      {{
        clickhouse_packages
        if (clickhouse_version | length == 0)
        else (clickhouse_packages | map('regex_replace', '$', '-' ~ clickhouse_version) | list)
      }}
    state: present
    # GPG check disabled: ClickHouse RPM packages in the LTS channel are currently
    # unsigned upstream (known issue as of 2026). Re-enable once signing is restored.
    disable_gpg_check: true
  tags: [clickhouse, install, clickhouse_install]

# -----------------------------------------------------------------------------
# Directories
# -----------------------------------------------------------------------------
- name: Ensure ClickHouse config directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ clickhouse_user }}"
    group: "{{ clickhouse_group }}"
    mode: "0750"
  loop:
    - "{{ clickhouse_config_dir }}"
    - "{{ clickhouse_users_dir }}"
  tags: [clickhouse, install, clickhouse_install]

# -----------------------------------------------------------------------------
# Configuration
# -----------------------------------------------------------------------------
- name: Deploy cluster.xml (Zookeeper + replication config)
  ansible.builtin.template:
    src: cluster.xml.j2
    dest: "{{ clickhouse_config_dir }}/cluster.xml"
    owner: "{{ clickhouse_user }}"
    group: "{{ clickhouse_group }}"
    mode: "0640"
  notify: Restart clickhouse-server
  tags: [clickhouse, configure, clickhouse_configure]

- name: Deploy default user password override
  ansible.builtin.template:
    src: default-password.xml.j2
    dest: "{{ clickhouse_users_dir }}/default-password.xml"
    owner: "{{ clickhouse_user }}"
    group: "{{ clickhouse_group }}"
    mode: "0640"
  notify: Restart clickhouse-server
  tags: [clickhouse, configure, clickhouse_configure]

- name: Deploy storage.xml (keep_free_space_bytes)
  ansible.builtin.template:
    src: storage.xml.j2
    dest: "{{ clickhouse_config_dir }}/storage.xml"
    owner: "{{ clickhouse_user }}"
    group: "{{ clickhouse_group }}"
    mode: "0640"
  notify: Restart clickhouse-server
  tags: [clickhouse, configure, clickhouse_configure]

# -----------------------------------------------------------------------------
# Systemd drop-in
# -----------------------------------------------------------------------------
- name: Create clickhouse-server systemd drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/system/clickhouse-server.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [clickhouse, configure, clickhouse_configure, service, clickhouse_service]

- name: Deploy clickhouse-server systemd drop-in (After=zookeeper.service)
  ansible.builtin.copy:
    content: |
      # Managed by Ansible - do not edit manually
      [Unit]
      After=zookeeper.service
      Wants=zookeeper.service
    dest: /etc/systemd/system/clickhouse-server.service.d/zookeeper-dep.conf
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart clickhouse-server
  tags: [clickhouse, configure, clickhouse_configure, service, clickhouse_service]

# -----------------------------------------------------------------------------
# Service
# -----------------------------------------------------------------------------
- name: Enable and start clickhouse-server
  ansible.builtin.systemd:
    name: clickhouse-server.service
    enabled: true
    state: started
    daemon_reload: true
  tags: [clickhouse, service, clickhouse_service]

# -----------------------------------------------------------------------------
# Retention (TTL)
# -----------------------------------------------------------------------------
- name: Apply ClickHouse retention policies
  ansible.builtin.include_tasks:
    file: retention.yml
    apply:
      tags: [clickhouse, clickhouse_retention]
  tags: [clickhouse, clickhouse_retention]

# -----------------------------------------------------------------------------
# Flush handlers prima della verifica
# Garantisce che restart/reload siano completati prima dei check.
# -----------------------------------------------------------------------------
- name: Flush handlers
  ansible.builtin.meta: flush_handlers
  tags: [clickhouse, verify, clickhouse_verify]

# -----------------------------------------------------------------------------
# Verification
# -----------------------------------------------------------------------------
- name: Verify clickhouse-server service is running
  ansible.builtin.systemd:
    name: clickhouse-server.service
  register: clickhouse_service_status
  tags: [clickhouse, verify, clickhouse_verify]

- name: Assert clickhouse-server service is active
  ansible.builtin.assert:
    that:
      - clickhouse_service_status.status.ActiveState == 'active'
      - clickhouse_service_status.status.SubState == 'running'
    fail_msg: >-
      clickhouse-server.service is not running.
      ActiveState={{ clickhouse_service_status.status.ActiveState }}
      SubState={{ clickhouse_service_status.status.SubState }}
    success_msg: "clickhouse-server.service is active and running"
  tags: [clickhouse, verify, clickhouse_verify]

- name: Wait for ClickHouse to be ready on port 9000
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ clickhouse_remote_port }}"
    delay: 2
    timeout: 60
  tags: [clickhouse, verify, clickhouse_verify]

- name: Verify ClickHouse responds to a test query
  ansible.builtin.command:
    cmd: >-
      clickhouse-client
      --password {{ clickhouse_password }}
      --query "SELECT 1"
  register: clickhouse_query_check
  changed_when: false
  failed_when: clickhouse_query_check.stdout | trim != '1'
  no_log: true
  tags: [clickhouse, verify, clickhouse_verify]