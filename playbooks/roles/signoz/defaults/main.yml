---
# -----------------------------------------------------------------------------
# Versions
# SigNoz and signoz-otel-collector share the same release cadence —
# always keep these two versions aligned.
# IMPORTANT: do not use "latest" for signoz_otel_collector_version —
# the /releases/latest endpoint may resolve to a source-only tag with no
# binary assets. Always pin to a known stable release with compiled binaries.
# Last verified stable with binaries: v0.129.13
# -----------------------------------------------------------------------------
signoz_version: "v0.119.0"
signoz_otel_collector_version: "v0.129.13"

# -----------------------------------------------------------------------------
# Paths
# -----------------------------------------------------------------------------
signoz_install_dir: /opt/signoz
signoz_data_dir: /var/lib/signoz
signoz_conf_dir: "{{ signoz_install_dir }}/conf"

# Temporary directory used only during migrations — cleaned up afterwards
signoz_migrations_tmp_dir: /tmp/signoz-migrations

# -----------------------------------------------------------------------------
# User / Group
# -----------------------------------------------------------------------------
signoz_user: signoz
signoz_group: signoz

# -----------------------------------------------------------------------------
# Service
# -----------------------------------------------------------------------------
signoz_api_port: 8080
signoz_alertmanager_provider: signoz
signoz_telemetrystore_provider: clickhouse
signoz_dot_metrics_enabled: true
signoz_instrumentation_logs_level: info
signoz_web_enabled: true

# -----------------------------------------------------------------------------
# Credentials
# TODO: move to ansible-vault before production rollout
# -----------------------------------------------------------------------------
signoz_jwt_secret: "secret"

# ClickHouse DSN — references clickhouse_password from clickhouse role defaults
# or group_vars/signoz.yml (single source of truth for the password)
signoz_clickhouse_dsn: "tcp://localhost:9000?password={{ clickhouse_password }}"

# -----------------------------------------------------------------------------
# Migrations
# Migrations are idempotent — safe to run on every playbook execution.
# Set to false only to explicitly skip (e.g. on a known-good re-run for speed).
# -----------------------------------------------------------------------------
signoz_run_migrations: true

# -----------------------------------------------------------------------------
# Architecture detection
# Maps uname -m output to the GitHub release asset naming convention.
# -----------------------------------------------------------------------------
signoz_arch_map:
  x86_64: amd64
  aarch64: arm64
signoz_arch: "{{ signoz_arch_map[ansible_architecture] }}"

# -----------------------------------------------------------------------------
# Download URLs
# -----------------------------------------------------------------------------
signoz_download_url: >-
  {{
    'https://github.com/SigNoz/signoz/releases/latest/download/signoz_linux_' ~ signoz_arch ~ '.tar.gz'
    if signoz_version == 'latest'
    else 'https://github.com/SigNoz/signoz/releases/download/' ~ signoz_version ~ '/signoz_linux_' ~ signoz_arch ~ '.tar.gz'
  }}
signoz_extracted_dirname: "signoz_linux_{{ signoz_arch }}"

signoz_otel_collector_download_url: >-
  {{
    'https://github.com/SigNoz/signoz-otel-collector/releases/latest/download/signoz-otel-collector_linux_' ~ signoz_arch ~ '.tar.gz'
    if signoz_otel_collector_version == 'latest'
    else 'https://github.com/SigNoz/signoz-otel-collector/releases/download/' ~ signoz_otel_collector_version ~ '/signoz-otel-collector_linux_' ~ signoz_arch ~ '.tar.gz'
  }}
signoz_otel_collector_extracted_dirname: "signoz-otel-collector_linux_{{ signoz_arch }}"