---
# -----------------------------------------------------------------------------
# User / Group / Directories
# -----------------------------------------------------------------------------
- name: Create signoz group
  ansible.builtin.group:
    name: "{{ signoz_group }}"
    system: true
    state: present
  tags: [signoz, install]

- name: Check if signoz user already exists
  ansible.builtin.getent:
    database: passwd
    key: "{{ signoz_user }}"
  register: signoz_user_check
  failed_when: false
  tags: [signoz, install]

- name: Create signoz user if not present
  ansible.builtin.user:
    name: "{{ signoz_user }}"
    group: "{{ signoz_group }}"
    system: true
    home: "{{ signoz_install_dir }}"
    create_home: false
    shell: /sbin/nologin
    state: present
  when: signoz_user_check.ansible_facts is not defined
  tags: [signoz, install]

- name: Create signoz directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ signoz_user }}"
    group: "{{ signoz_group }}"
    mode: "0755"
  loop:
    - "{{ signoz_install_dir }}"
    - "{{ signoz_data_dir }}"
    - "{{ signoz_conf_dir }}"
  tags: [signoz, install]

# -----------------------------------------------------------------------------
# Binary install
# -----------------------------------------------------------------------------
- name: Download signoz archive
  ansible.builtin.get_url:
    url: "{{ signoz_download_url }}"
    dest: "/tmp/signoz.tar.gz"
    mode: "0644"
    force: "{{ signoz_version == 'latest' }}"
  tags: [signoz, install]

- name: Extract signoz archive
  ansible.builtin.unarchive:
    src: "/tmp/signoz.tar.gz"
    dest: /tmp
    remote_src: true
  tags: [signoz, install]

- name: Copy signoz files into install dir
  ansible.builtin.copy:
    src: "/tmp/{{ signoz_extracted_dirname }}/"
    dest: "{{ signoz_install_dir }}/"
    remote_src: true
    owner: "{{ signoz_user }}"
    group: "{{ signoz_group }}"
    mode: preserve
  register: signoz_copy_result
  notify: Restart signoz
  tags: [signoz, install]

- name: Restore SELinux context on signoz install dir
  ansible.builtin.command:
    cmd: restorecon -Rv {{ signoz_install_dir }}
  changed_when: false
  when: signoz_copy_result.changed
  tags: [signoz, install]

- name: Cleanup signoz temp extraction dir
  ansible.builtin.file:
    path: "/tmp/{{ signoz_extracted_dirname }}"
    state: absent
  tags: [signoz, install]

- name: Cleanup signoz archive
  ansible.builtin.file:
    path: "/tmp/signoz.tar.gz"
    state: absent
  tags: [signoz, install]

# -----------------------------------------------------------------------------
# Configuration
# -----------------------------------------------------------------------------
- name: Deploy signoz systemd environment file
  ansible.builtin.template:
    src: systemd.env.j2
    dest: "{{ signoz_conf_dir }}/systemd.env"
    owner: "{{ signoz_user }}"
    group: "{{ signoz_group }}"
    mode: "0640"
  notify: Restart signoz
  tags: [signoz, configure]

- name: Deploy signoz systemd unit
  ansible.builtin.template:
    src: signoz.service.j2
    dest: /etc/systemd/system/signoz.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart signoz
  tags: [signoz, configure, service]

# -----------------------------------------------------------------------------
# Migrations
# -----------------------------------------------------------------------------
- name: Run ClickHouse schema migrations
  ansible.builtin.include_tasks:
    file: migrations.yml
    apply:
      tags: [signoz, migrations]
  when: signoz_run_migrations | bool
  tags: [signoz, migrations]

# -----------------------------------------------------------------------------
# Service
# -----------------------------------------------------------------------------
- name: Enable and start signoz
  ansible.builtin.systemd:
    name: signoz.service
    enabled: true
    state: started
    daemon_reload: true
  tags: [signoz, service]

# -----------------------------------------------------------------------------
# Verification
# -----------------------------------------------------------------------------
- name: Verify signoz service is running
  ansible.builtin.systemd:
    name: signoz.service
  register: signoz_service_status
  tags: [signoz, verify]

- name: Assert signoz service is active
  ansible.builtin.assert:
    that:
      - signoz_service_status.status.ActiveState == 'active'
      - signoz_service_status.status.SubState == 'running'
    fail_msg: >-
      signoz.service is not running.
      ActiveState={{ signoz_service_status.status.ActiveState }}
      SubState={{ signoz_service_status.status.SubState }}
    success_msg: "signoz.service is active and running"
  tags: [signoz, verify]

- name: Wait for signoz API to be ready
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ signoz_api_port }}"
    delay: 3
    timeout: 120
  tags: [signoz, verify]

- name: Verify signoz health endpoint
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ signoz_api_port }}/api/v1/health"
    method: GET
    return_content: true
    status_code: 200
  register: signoz_health
  retries: 5
  delay: 3
  until: signoz_health.status == 200
  tags: [signoz, verify]

- name: Assert signoz health status is ok
  ansible.builtin.assert:
    that:
      - (signoz_health.json.status | default('')) == 'ok'
    fail_msg: "SigNoz health endpoint returned unexpected status: {{ signoz_health.content }}"
    success_msg: "SigNoz is healthy"
  tags: [signoz, verify]