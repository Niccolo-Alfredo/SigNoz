---
# -----------------------------------------------------------------------------
# User / Group / Directories
# -----------------------------------------------------------------------------
- name: Ensure signoz group exists
  ansible.builtin.group:
    name: "{{ signoz_otel_group }}"
    system: true
    state: present
  tags: [signoz_otel_collector, install]

- name: Check if signoz user already exists
  ansible.builtin.getent:
    database: passwd
    key: "{{ signoz_otel_user }}"
  register: signoz_otel_user_check
  failed_when: false
  tags: [signoz_otel_collector, install]

- name: Create signoz user if not present
  ansible.builtin.user:
    name: "{{ signoz_otel_user }}"
    group: "{{ signoz_otel_group }}"
    system: true
    home: "{{ signoz_otel_install_dir }}"
    create_home: false
    shell: /sbin/nologin
    state: present
  when: signoz_otel_user_check.ansible_facts is not defined
  tags: [signoz_otel_collector, install]

- name: Create signoz-otel-collector directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ signoz_otel_user }}"
    group: "{{ signoz_otel_group }}"
    mode: "0755"
  loop:
    - "{{ signoz_otel_install_dir }}"
    - "{{ signoz_otel_data_dir }}"
    - "{{ signoz_otel_conf_dir }}"
  tags: [signoz_otel_collector, install]

# -----------------------------------------------------------------------------
# Binary install
# -----------------------------------------------------------------------------
- name: Download signoz-otel-collector archive
  ansible.builtin.get_url:
    url: "{{ signoz_otel_download_url }}"
    dest: "/tmp/signoz-otel-collector.tar.gz"
    mode: "0644"
    force: "{{ signoz_otel_collector_version == 'latest' }}"
  tags: [signoz_otel_collector, install]

- name: Extract signoz-otel-collector archive
  ansible.builtin.unarchive:
    src: "/tmp/signoz-otel-collector.tar.gz"
    dest: /tmp
    remote_src: true
  tags: [signoz_otel_collector, install]

- name: Copy signoz-otel-collector files into install dir
  ansible.builtin.copy:
    src: "/tmp/{{ signoz_otel_extracted_dirname }}/"
    dest: "{{ signoz_otel_install_dir }}/"
    remote_src: true
    owner: "{{ signoz_otel_user }}"
    group: "{{ signoz_otel_group }}"
    mode: preserve
  register: signoz_otel_copy_result
  notify: Restart signoz-otel-collector
  tags: [signoz_otel_collector, install]

- name: Restore SELinux context on signoz-otel-collector install dir
  ansible.builtin.command:
    cmd: restorecon -Rv {{ signoz_otel_install_dir }}
  changed_when: false
  when: signoz_otel_copy_result.changed
  tags: [signoz_otel_collector, install]

- name: Cleanup signoz-otel-collector temp extraction dir
  ansible.builtin.file:
    path: "/tmp/{{ signoz_otel_extracted_dirname }}"
    state: absent
  tags: [signoz_otel_collector, install]

- name: Cleanup signoz-otel-collector archive
  ansible.builtin.file:
    path: "/tmp/signoz-otel-collector.tar.gz"
    state: absent
  tags: [signoz_otel_collector, install]

# -----------------------------------------------------------------------------
# Configuration
# -----------------------------------------------------------------------------
- name: Deploy collector config.yaml
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ signoz_otel_conf_dir }}/config.yaml"
    owner: "{{ signoz_otel_user }}"
    group: "{{ signoz_otel_group }}"
    mode: "0640"
  notify: Restart signoz-otel-collector
  tags: [signoz_otel_collector, configure]

- name: Deploy collector opamp.yaml
  ansible.builtin.template:
    src: opamp.yaml.j2
    dest: "{{ signoz_otel_conf_dir }}/opamp.yaml"
    owner: "{{ signoz_otel_user }}"
    group: "{{ signoz_otel_group }}"
    mode: "0640"
  notify: Restart signoz-otel-collector
  tags: [signoz_otel_collector, configure]

- name: Deploy signoz-otel-collector systemd unit
  ansible.builtin.template:
    src: signoz-otel-collector.service.j2
    dest: /etc/systemd/system/signoz-otel-collector.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart signoz-otel-collector
  tags: [signoz_otel_collector, configure, service]

# -----------------------------------------------------------------------------
# Service
# -----------------------------------------------------------------------------
- name: Enable and start signoz-otel-collector
  ansible.builtin.systemd:
    name: signoz-otel-collector.service
    enabled: true
    state: started
    daemon_reload: true
  tags: [signoz_otel_collector, service]

# -----------------------------------------------------------------------------
# Flush handlers prima della verifica
# Garantisce che restart/reload siano completati prima dei check.
# -----------------------------------------------------------------------------
- name: Flush handlers
  ansible.builtin.meta: flush_handlers
  tags: [signoz_otel_collector, verify]

# -----------------------------------------------------------------------------
# Verification
# -----------------------------------------------------------------------------
- name: Verify signoz-otel-collector service is running
  ansible.builtin.systemd:
    name: signoz-otel-collector.service
  register: signoz_otel_service_status
  tags: [signoz_otel_collector, verify]

- name: Assert signoz-otel-collector service is active
  ansible.builtin.assert:
    that:
      - signoz_otel_service_status.status.ActiveState == 'active'
      - signoz_otel_service_status.status.SubState == 'running'
    fail_msg: >-
      signoz-otel-collector.service is not running.
      ActiveState={{ signoz_otel_service_status.status.ActiveState }}
      SubState={{ signoz_otel_service_status.status.SubState }}
    success_msg: "signoz-otel-collector.service is active and running"
  tags: [signoz_otel_collector, verify]

- name: Wait for collector health endpoint to be ready
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ signoz_otel_health_check_port }}"
    delay: 2
    timeout: 60
  tags: [signoz_otel_collector, verify]

- name: Verify collector health endpoint
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ signoz_otel_health_check_port }}/"
    method: GET
    status_code: 200
  register: signoz_otel_health
  retries: 5
  delay: 3
  until: signoz_otel_health.status == 200
  tags: [signoz_otel_collector, verify]