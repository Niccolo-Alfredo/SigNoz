---
# -----------------------------------------------------------------------------
# Version
# Zookeeper 3.8.x is the current LTS (stable) branch.
# Check https://zookeeper.apache.org/releases.html for updates.
# -----------------------------------------------------------------------------
zookeeper_version: "3.8.6"

# -----------------------------------------------------------------------------
# Paths
# -----------------------------------------------------------------------------
zookeeper_install_dir: /opt/zookeeper
zookeeper_data_dir: /var/lib/zookeeper
zookeeper_log_dir: /var/log/zookeeper

# -----------------------------------------------------------------------------
# User / Group
# -----------------------------------------------------------------------------
zookeeper_user: zookeeper
zookeeper_group: zookeeper

# -----------------------------------------------------------------------------
# Network
# -----------------------------------------------------------------------------
zookeeper_client_port: 2181
zookeeper_admin_port: 3181

# -----------------------------------------------------------------------------
# Tuning
# -----------------------------------------------------------------------------
zookeeper_tick_time: 2000

# -----------------------------------------------------------------------------
# Download
# Primary URL uses the Apache CDN mirror network.
# Archive filename and extracted dirname are derived from version automatically.
# -----------------------------------------------------------------------------
zookeeper_archive_filename: "apache-zookeeper-{{ zookeeper_version }}-bin.tar.gz"
zookeeper_download_url: "https://dlcdn.apache.org/zookeeper/zookeeper-{{ zookeeper_version }}/{{ zookeeper_archive_filename }}"
zookeeper_extracted_dirname: "apache-zookeeper-{{ zookeeper_version }}-bin"

# -----------------------------------------------------------------------------
# System packages (Rocky Linux 9 / EL9)
# -----------------------------------------------------------------------------
zookeeper_system_packages:
  - java-17-openjdk-headless
  - tar
  - policycoreutils
  - policycoreutils-python-utils