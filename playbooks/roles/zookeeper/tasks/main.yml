---
# -----------------------------------------------------------------------------
# System packages
# -----------------------------------------------------------------------------
- name: Install required system packages
  ansible.builtin.dnf:
    name: "{{ zookeeper_system_packages }}"
    state: present
  tags: [zookeeper, install]

# -----------------------------------------------------------------------------
# User / Group / Directories
# -----------------------------------------------------------------------------
- name: Create zookeeper group
  ansible.builtin.group:
    name: "{{ zookeeper_group }}"
    system: true
    state: present
  tags: [zookeeper, install]

- name: Create zookeeper user
  ansible.builtin.user:
    name: "{{ zookeeper_user }}"
    group: "{{ zookeeper_group }}"
    system: true
    home: "{{ zookeeper_install_dir }}"
    create_home: false
    shell: /sbin/nologin
    state: present
  tags: [zookeeper, install]

- name: Create zookeeper directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ zookeeper_user }}"
    group: "{{ zookeeper_group }}"
    mode: "0755"
  loop:
    - "{{ zookeeper_install_dir }}"
    - "{{ zookeeper_data_dir }}"
    - "{{ zookeeper_log_dir }}"
  tags: [zookeeper, install]

# -----------------------------------------------------------------------------
# Binary install (idempotent via VERSION marker)
# -----------------------------------------------------------------------------
- name: Check installed zookeeper version
  ansible.builtin.stat:
    path: "{{ zookeeper_install_dir }}/VERSION"
  register: zookeeper_version_stat
  tags: [zookeeper, install]

- name: Read installed zookeeper version
  ansible.builtin.slurp:
    src: "{{ zookeeper_install_dir }}/VERSION"
  register: zookeeper_installed_version_raw
  when: zookeeper_version_stat.stat.exists
  failed_when: false
  tags: [zookeeper, install]

- name: Set installed zookeeper version fact
  ansible.builtin.set_fact:
    zookeeper_installed_version: >-
      {{
        (zookeeper_installed_version_raw.content | b64decode | trim)
        if (zookeeper_version_stat.stat.exists and zookeeper_installed_version_raw.content is defined)
        else ''
      }}
  tags: [zookeeper, install]

- name: Download zookeeper archive
  ansible.builtin.get_url:
    url: "{{ zookeeper_download_url }}"
    dest: "/tmp/{{ zookeeper_archive_filename }}"
    mode: "0644"
  when: zookeeper_installed_version != zookeeper_version
  tags: [zookeeper, install]

- name: Extract zookeeper archive
  ansible.builtin.unarchive:
    src: "/tmp/{{ zookeeper_archive_filename }}"
    dest: /tmp
    remote_src: true
    creates: "/tmp/{{ zookeeper_extracted_dirname }}"
  when: zookeeper_installed_version != zookeeper_version
  tags: [zookeeper, install]

- name: Copy zookeeper files into install dir
  ansible.builtin.copy:
    src: "/tmp/{{ zookeeper_extracted_dirname }}/"
    dest: "{{ zookeeper_install_dir }}/"
    remote_src: true
    owner: "{{ zookeeper_user }}"
    group: "{{ zookeeper_group }}"
    mode: preserve
  when: zookeeper_installed_version != zookeeper_version
  register: zookeeper_copy_result
  notify: Restart zookeeper
  tags: [zookeeper, install]

- name: Write VERSION marker
  ansible.builtin.copy:
    content: "{{ zookeeper_version }}"
    dest: "{{ zookeeper_install_dir }}/VERSION"
    owner: "{{ zookeeper_user }}"
    group: "{{ zookeeper_group }}"
    mode: "0644"
  when: zookeeper_installed_version != zookeeper_version
  tags: [zookeeper, install]

- name: Restore SELinux context on install dir
  ansible.builtin.command:
    cmd: restorecon -Rv {{ zookeeper_install_dir }}
  changed_when: false
  when: zookeeper_installed_version != zookeeper_version
  tags: [zookeeper, install]

- name: Cleanup extracted dir from /tmp
  ansible.builtin.file:
    path: "/tmp/{{ zookeeper_extracted_dirname }}"
    state: absent
  when: zookeeper_installed_version != zookeeper_version
  tags: [zookeeper, install]

- name: Cleanup archive from /tmp
  ansible.builtin.file:
    path: "/tmp/{{ zookeeper_archive_filename }}"
    state: absent
  when: zookeeper_installed_version != zookeeper_version
  tags: [zookeeper, install]

# -----------------------------------------------------------------------------
# Configuration
# -----------------------------------------------------------------------------
- name: Deploy zoo.cfg
  ansible.builtin.template:
    src: zoo.cfg.j2
    dest: "{{ zookeeper_install_dir }}/conf/zoo.cfg"
    owner: "{{ zookeeper_user }}"
    group: "{{ zookeeper_group }}"
    mode: "0644"
  notify: Restart zookeeper
  tags: [zookeeper, configure]

- name: Deploy zoo.env
  ansible.builtin.template:
    src: zoo.env.j2
    dest: "{{ zookeeper_install_dir }}/conf/zoo.env"
    owner: "{{ zookeeper_user }}"
    group: "{{ zookeeper_group }}"
    mode: "0644"
  notify: Restart zookeeper
  tags: [zookeeper, configure]

# -----------------------------------------------------------------------------
# Systemd
# -----------------------------------------------------------------------------
- name: Deploy zookeeper systemd unit
  ansible.builtin.template:
    src: zookeeper.service.j2
    dest: /etc/systemd/system/zookeeper.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart zookeeper
  tags: [zookeeper, configure, service]

- name: Enable and start zookeeper
  ansible.builtin.systemd:
    name: zookeeper.service
    enabled: true
    state: started
    daemon_reload: true
  tags: [zookeeper, service]

# -----------------------------------------------------------------------------
# Verification
# -----------------------------------------------------------------------------
- name: Verify zookeeper service is running
  ansible.builtin.systemd:
    name: zookeeper.service
  register: zookeeper_service_status
  tags: [zookeeper, verify]

- name: Assert zookeeper service is active
  ansible.builtin.assert:
    that:
      - zookeeper_service_status.status.ActiveState == 'active'
      - zookeeper_service_status.status.SubState == 'running'
    fail_msg: >-
      zookeeper.service is not running.
      ActiveState={{ zookeeper_service_status.status.ActiveState }}
      SubState={{ zookeeper_service_status.status.SubState }}
    success_msg: "zookeeper.service is active and running"
  tags: [zookeeper, verify]

- name: Verify zookeeper responds on client port (ruok check)
  ansible.builtin.shell:
    cmd: "echo ruok | nc -w 2 {{ zookeeper_client_port }} localhost"
  register: zookeeper_ruok
  changed_when: false
  failed_when: zookeeper_ruok.stdout != 'imok'
  tags: [zookeeper, verify]